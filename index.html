<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1f2ec;
    --card: #ffffff;
    --ink: #00063d;
    --soft: #5b6079;
    --line: #dfe0d8;
    --cyan: #05e0e9;
    --lime: #bff47b;
    --navy: #00063d;
    --danger: #e5341c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Syne", system-ui, sans-serif;
    line-height: 1.5;
    padding: 32px 20px 100px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 30px; font-weight: 500; letter-spacing: -0.01em; }
  .sub { color: var(--soft); font-size: 15px; margin-top: 6px; font-weight: 500; }

  .addbar { margin: 28px 0 8px; }
  .addbtn {
    background: var(--lime);
    color: var(--navy);
    border: none;
    border-radius: 999px;
    font-family: "Syne", sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 12px 22px;
    cursor: pointer;
    transition: transform 150ms ease-out, background-color 150ms ease-out;
  }
  .addbtn:hover { background: #aee868; transform: translateY(-1px); }

  .form {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    margin: 16px 0 8px;
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .form.open { display: flex; }
  .form label {
    font-size: 0.72rem;
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
  }
  .form textarea, .form input[type="text"] {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: "Syne", sans-serif;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
  }
  .form textarea:focus, .form input:focus { outline: 2px solid var(--cyan); outline-offset: 1px; }
  .form textarea { min-height: 90px; }
  .drop {
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--soft);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--bg);
  }
  .drop.has { padding: 8px; border-style: solid; }
  .drop img { max-width: 100%; border-radius: 8px; display: block; }
  .form-actions { display: flex; gap: 10px; }
  .save {
    background: var(--lime);
    color: var(--navy);
    border: none;
    border-radius: 999px;
    padding: 11px 22px;
    font-family: "Syne", sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 150ms ease-out;
  }
  .save:hover { transform: translateY(-1px); }
  .cancel {
    background: none;
    border: 1px solid var(--line);
    color: var(--soft);
    border-radius: 999px;
    padding: 11px 22px;
    font-family: "Syne", sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  .shelf { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
  .post {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 560px) {
    .post { flex-direction: row; }
    .thumb { width: 180px; flex-shrink: 0; }
  }
  .thumb {
    background: #e8e9e1;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--soft);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .caption { font-size: 15px; white-space: pre-wrap; font-weight: 500; }
  .foot { display: flex; align-items: center; justify-content: flex-end; margin-top: auto; gap: 10px; }
  .btns { display: flex; gap: 8px; }
  .copy, .del {
    border: 1px solid var(--line);
    background: var(--bg);
    font-family: "Syne", sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 15px;
    border-radius: 999px;
    cursor: pointer;
  }
  .copy { color: var(--navy); background: var(--lime); border-color: var(--lime); }
  .copy:hover { background: #aee868; }
  .copy.done { background: var(--cyan); border-color: var(--cyan); color: var(--navy); }
  .del { color: #fff; background: #ff2d16; border-color: #ff2d16; }
  .del:hover { background: #e5341c; }

  .empty { color: var(--soft); font-size: 15px; text-align: center; padding: 40px 0; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Content shelf</h1>
  <p class="sub">Image plus caption, ready to grab. Everything saves in this browser.</p>

  <div class="addbar">
    <button class="addbtn" id="addToggle">+ Add a post</button>
  </div>

  <div class="form" id="form">
    <div>
      <label>Image</label>
      <div class="drop" id="drop">Click to choose an image</div>
      <input type="file" id="file" accept="image/*" hidden>
    </div>
    <div>
      <label>Caption</label>
      <textarea id="caption" placeholder="Write your caption..."></textarea>
    </div>
    <div class="form-actions">
      <button class="save" id="save">Save post</button>
      <button class="cancel" id="cancel">Cancel</button>
    </div>
  </div>

  <div class="shelf" id="shelf"></div>
</div>

<script>
  var KEY = 'contentShelf.posts.v1';
  var posts = [];
  var pendingImage = null;

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      posts = raw ? JSON.parse(raw) : seed();
    } catch (e) { posts = seed(); }
    render();
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(posts)); }
    catch (e) { alert('Storage is full. Try a smaller image.'); }
  }
  function seed() {
    return [
      { id: 1, img: null, caption: 'Finished this in May. Sat with it, tested it, let it breathe. Some things are worth finishing slowly. This is my new site.' },
      { id: 2, img: null, caption: '23 pages, hand coded. I wanted to get it right before I put it out. That takes the time it takes.' }
    ];
  }

  function render() {
    var shelf = document.getElementById('shelf');
    shelf.innerHTML = '';
    if (!posts.length) {
      shelf.innerHTML = '<div class="empty">No posts yet. Tap "Add a post" to start.</div>';
      return;
    }
    posts.forEach(function (p) {
      var post = document.createElement('div');
      post.className = 'post';
      var thumb = p.img
        ? '<div class="thumb"><img src="' + p.img + '" alt=""></div>'
        : '<div class="thumb">No image</div>';
      post.innerHTML =
        thumb +
        '<div class="body">' +
          '<div class="caption">' + escapeHtml(p.caption) + '</div>' +
          '<div class="foot">' +
            '<div class="btns">' +
              '<button class="copy">Copy</button>' +
              '<button class="del">Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      post.querySelector('.copy').addEventListener('click', function (e) {
        var btn = e.target;
        navigator.clipboard.writeText(p.caption).then(function () {
          btn.textContent = 'Copied';
          btn.classList.add('done');
          setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 1500);
        });
      });
      post.querySelector('.del').addEventListener('click', function () {
        if (confirm('Delete this post?')) {
          posts = posts.filter(function (x) { return x.id !== p.id; });
          save(); render();
        }
      });
      shelf.appendChild(post);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  var form = document.getElementById('form');
  var drop = document.getElementById('drop');
  var fileInput = document.getElementById('file');

  document.getElementById('addToggle').addEventListener('click', function () {
    form.classList.toggle('open');
  });
  document.getElementById('cancel').addEventListener('click', resetForm);
  drop.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function () {
    var f = fileInput.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      pendingImage = reader.result;
      drop.classList.add('has');
      drop.innerHTML = '<img src="' + pendingImage + '" alt="">';
    };
    reader.readAsDataURL(f);
  });

  document.getElementById('save').addEventListener('click', function () {
    var caption = document.getElementById('caption').value.trim();
    if (!caption) { alert('Add a caption first.'); return; }
    posts.unshift({ id: Date.now(), img: pendingImage, caption: caption });
    save(); render(); resetForm();
  });

  function resetForm() {
    form.classList.remove('open');
    document.getElementById('caption').value = '';
    pendingImage = null;
    drop.classList.remove('has');
    drop.textContent = 'Click to choose an image';
    fileInput.value = '';
  }

  load();
</script>
</body>
</html>
